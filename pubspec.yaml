name: jeunesseactive
description: A professional platform for young entrepreneurs to offer services and connect with clients.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # UI / Typography
  google_fonts: ^6.2.1

  # Image Picker (camera + gallery)
  image_picker: ^1.0.7

  # GPS / Location
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Storage
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.3.3
  timeago: ^3.6.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
